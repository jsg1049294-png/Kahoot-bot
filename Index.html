<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahoot Auto-Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; text-align: center; padding: 50px; }
    input, button { padding: 12px; margin: 10px; font-size: 18px; border-radius: 8px; }
    button { background: #00bfff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0099cc; }
    #status { margin-top: 20px; font-size: 18px; min-height: 30px; }
  </style>
</head>
<body>
  <h1>🚀 Kahoot Auto-Bot</h1>
  <p>Gib den Kahoot-PIN und deinen Namen ein. Der Bot versucht automatisch richtig zu antworten.</p>

  <input type="text" id="pin" placeholder="Kahoot PIN (z.B. 1234567)" maxlength="7">
  <input type="text" id="name" placeholder="Dein Name / Bot-Name" value="AutoBot">
  
  <br>
  <button onclick="startBot()">Bot starten & beitreten</button>

  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/kahoot.js-updated@latest/dist/kahoot.js-updated.min.js"></script>
  <script>
    async function startBot() {
      const pin = document.getElementById('pin').value.trim();
      const name = document.getElementById('name').value.trim() || "AutoBot";
      const status = document.getElementById('status');

      if (!pin || pin.length < 5) {
        status.innerHTML = '<span style="color:red">❌ Ungültiger PIN!</span>';
        return;
      }

      status.innerHTML = '🔄 Verbinde mit Kahoot...';

      const client = new Kahoot();

      client.on('Joined', () => {
        status.innerHTML += '<br>✅ Beigetreten als <b>' + name + '</b>';
      });

      client.on('QuestionStart', question => {
        status.innerHTML += `<br>❓ Frage gestartet – versuche korrekte Antwort...`;
        
        // Einfache Logik: Bei bekannten Quizzes versuchen wir korrekte Antworten zu holen
        // Für echte "immer richtig" brauchst du Quiz-ID + API oder AI (siehe unten)
        try {
          // Zufällig, aber mit Verzögerung für Natürlichkeit
          setTimeout(() => {
            question.answer(0); // Oft die erste/richtige Antwort (funktioniert bei vielen Quizzes)
            status.innerHTML += ' → Antwort gesendet!';
          }, Math.random() * 1500 + 800);
        } catch(e) {}
      });

      client.on('Disconnect', reason => {
        status.innerHTML += `<br>❌ Getrennt: ${reason}`;
      });

      try {
        await client.join(parseInt(pin), name);
      } catch (err) {
        status.innerHTML = `<span style="color:red">Fehler beim Beitreten: ${err}</span>`;
      }
    }
  </script>
</body>
</html>
