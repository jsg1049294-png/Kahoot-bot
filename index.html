<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kahoot • GODMODE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .background {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://source.unsplash.com/random/1920x1080/?cyberpunk,neon') no-repeat center center/cover;
      opacity: 0.15;
      z-index: -1;
    }
    .container {
      max-width: 620px;
      margin: 60px auto;
      padding: 40px 30px;
      background: rgba(0, 0, 0, 0.88);
      border: 4px solid #00ffcc;
      border-radius: 20px;
      box-shadow: 0 0 50px #00ffcc, 0 0 100px rgba(0, 255, 204, 0.3);
      text-align: center;
    }
    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 2.8rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00ffcc, #ff00ff, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #00ffcc;
    }
    .subtitle { color: #00ffcc; margin-bottom: 30px; font-size: 1.2rem; }
    input {
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      background: rgba(255,255,255,0.08);
      border: 3px solid #00ffcc;
      border-radius: 12px;
      color: white;
      font-size: 1.2rem;
      text-align: center;
    }
    input:focus {
      border-color: #ff00ff;
      box-shadow: 0 0 25px #ff00ff;
      outline: none;
    }
    button {
      margin-top: 25px;
      padding: 18px 60px;
      font-size: 1.5rem;
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(45deg, #00ffcc, #ff00ff);
      color: black;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s;
      box-shadow: 0 0 40px #00ffcc;
    }
    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 60px #ff00ff;
    }
    #status {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      min-height: 120px;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .neon { animation: neon 1.5s infinite alternate; }
    @keyframes neon {
      from { text-shadow: 0 0 10px #00ffcc; }
      to { text-shadow: 0 0 40px #00ffcc, 0 0 60px #ff00ff; }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  
  <div class="container">
    <h1 class="neon">KAHOOT GODMODE</h1>
    <p class="subtitle">💀 AUTO ANSWER BOT 2026 💀</p>

    <input type="text" id="pin" placeholder="Kahoot PIN (z.B. 1234567)" maxlength="7">
    <input type="text" id="name" placeholder="Bot Name" value="GodBot420">

    <button onclick="startBot()">🚀 BOT STARTEN & BEITRETEN</button>

    <div id="status"></div>
  </div>

  <script>
    async function startBot() {
      const pin = document.getElementById('pin').value.trim();
      const name = document.getElementById('name').value.trim() || "GodBot420";
      const status = document.getElementById('status');

      if (!pin || pin.length < 5) {
        status.innerHTML = '<span style="color:#ff0066">❌ Bitte gültigen PIN eingeben!</span>';
        return;
      }

      status.innerHTML = '<span style="color:#00ffcc">🔄 Versuche Verbindung zur Lobby...</span>';

      try {
        // Neuere Bibliothek
        const { default: Kahoot } = await import('https://cdn.jsdelivr.net/npm/kahoot.js-latest@latest');

        const client = new Kahoot();

        client.on("Joined", () => {
          status.innerHTML += `<br><span style="color:#00ff00">✅ Erfolgreich in der Lobby als <b>${name}</b>!</span>`;
        });

        client.on("QuestionStart", (question) => {
          status.innerHTML += `<br><span style="color:#ffff00">❓ Frage erkannt – antworte automatisch...</span>`;
          setTimeout(() => {
            try {
              question.answer(0); // Erste Antwort (bei vielen Quizzes korrekt)
            } catch(e) {}
          }, 700 + Math.random() * 1300);
        });

        client.on("Disconnect", (reason) => {
          status.innerHTML += `<br><span style="color:#ff0066">Verbindung getrennt: ${reason}</span>`;
        });

        await client.join(parseInt(pin), name);

      } catch (err) {
        console.error(err);
        status.innerHTML = `
          <span style="color:#ff0066">
            ❌ Browser-Verbindung fehlgeschlagen (Kahoot Schutz).<br><br>
            <b>Empfohlene Lösung:</b><br>
            1. Installiere die Chrome-Extension <b>kAIhoot</b> (GitHub: Gavri-dev/kAIhoot)<br>
            2. Oder nutze einen Python-Bot (Raymo111/kahoot-answer-bot)<br><br>
            Der Browser-Bot funktioniert leider nicht immer stabil.
          </span>`;
      }
    }

    // Enter-Taste Unterstützung
    document.addEventListener("keypress", (e) => {
      if (e.key === "Enter") startBot();
    });
  </script>
</body>
</html>
